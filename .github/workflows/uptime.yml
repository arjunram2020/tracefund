# Zero-cost uptime monitor. On a schedule, pings the indexer health endpoint (and
# optionally the frontend). A failed check turns the workflow red (GitHub emails
# the repo owner) AND opens/reuses a single tracking GitHub issue so the failure
# stays visible somewhere durable — not just a one-off email that can get missed
# — without needing a paid paging vendor (PagerDuty, Opsgenie, etc.). A real
# paging integration with an on-call rotation is still the recommended next step
# for anything beyond a small team; this closes the "at least something durable
# happens" gap at zero cost in the meantime.
#
# Setup (one-time): add repository variables under
#   Settings -> Secrets and variables -> Actions -> Variables
#     HEALTH_URL   e.g. https://your-host/api/health   (required to actually check)
#     SITE_URL     e.g. https://your-app.example        (optional)
# Until HEALTH_URL is set, the job no-ops (so a fresh clone isn't perpetually red).
name: Uptime

on:
  schedule:
    - cron: "*/15 * * * *" # every 15 minutes
  workflow_dispatch: {} # allow manual runs

permissions:
  contents: read
  issues: write # to open/close the tracking issue on failure/recovery

jobs:
  healthcheck:
    name: Health check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check indexer health endpoint
        id: indexer
        continue-on-error: true # let the tracking-issue step run even on failure
        env:
          HEALTH_URL: ${{ vars.HEALTH_URL }}
        run: |
          if [ -z "$HEALTH_URL" ]; then
            echo "HEALTH_URL not set — skipping (configure it in repo Variables to enable monitoring)."
            exit 0
          fi
          echo "Checking $HEALTH_URL"
          # Retry a few times so a single blip doesn't page us.
          for i in 1 2 3; do
            code=$(curl -sS -o /tmp/body -w "%{http_code}" --max-time 20 "$HEALTH_URL" || echo "000")
            body=$(cat /tmp/body 2>/dev/null || true)
            echo "attempt $i -> HTTP $code"
            if [ "$code" = "200" ] && echo "$body" | grep -q '"ok":true'; then
              echo "Healthy: $body"
              exit 0
            fi
            sleep 15
          done
          echo "::error::Indexer health check FAILED for $HEALTH_URL (last HTTP $code): $body"
          echo "detail=Indexer health check failed for $HEALTH_URL (last HTTP $code): $body" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Check frontend (optional)
        id: frontend
        if: ${{ vars.SITE_URL != '' }}
        continue-on-error: true
        env:
          SITE_URL: ${{ vars.SITE_URL }}
        run: |
          code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 20 "$SITE_URL" || echo "000")
          echo "Frontend $SITE_URL -> HTTP $code"
          case "$code" in
            2??|3??) echo "Frontend reachable." ;;
            *)
              echo "::error::Frontend check FAILED for $SITE_URL (HTTP $code)"
              echo "detail=Frontend check failed for $SITE_URL (HTTP $code)" >> "$GITHUB_OUTPUT"
              exit 1
              ;;
          esac

      # Keep exactly one open tracking issue for "monitoring is currently red".
      # Opens/updates it on failure, closes it automatically on the next healthy
      # run — so the signal is "an open issue exists," not a growing pile of them.
      - name: Update tracking issue
        if: always() && (vars.HEALTH_URL != '' || vars.SITE_URL != '')
        uses: actions/github-script@v7
        with:
          script: |
            const indexerOutcome = "${{ steps.indexer.outcome }}";
            const frontendOutcome = "${{ steps.frontend.outcome }}";
            const failed = indexerOutcome === "failure" || frontendOutcome === "failure";
            const details = [
              "${{ steps.indexer.outputs.detail }}",
              "${{ steps.frontend.outputs.detail }}",
            ].filter(Boolean);

            const title = "🔴 Uptime check failing";
            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "uptime",
            });
            const existing = issues.find((i) => i.title === title);

            if (failed) {
              const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
              const body = [
                `Uptime check failed at ${new Date().toISOString()}.`,
                "",
                ...details.map((d) => `- ${d}`),
                "",
                `See the [failed run](${runUrl}) for full logs.`,
                "",
                "This issue stays open and is updated in place until a check succeeds again — it will auto-close then.",
              ].join("\n");
              if (existing) {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: existing.number,
                  body,
                });
              } else {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title,
                  body,
                  labels: ["uptime"],
                });
              }
            } else if (existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: `Recovered at ${new Date().toISOString()} — closing.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                state: "closed",
              });
            }

      # Preserve the original behavior (red workflow run + GitHub email) now that
      # the checks above use continue-on-error to let the issue-tracking step run.
      - name: Fail the job if any check failed
        if: steps.indexer.outcome == 'failure' || steps.frontend.outcome == 'failure'
        run: exit 1
